version: "3"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8000"
    depends_on:
      - postgreSQL
  postgreSQL:
    image: postgres:12
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

    # environment:
    #   POSTGRES_DB: rest_app
    #   POSTGRES_USER: postgres
    #   POSTGRES_PASSWORD: 567234
